kind = "web"
previewPath = "/"
title = "RouteWorks"
version = "1.0.0"
id = "artifacts/routeworks"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22784

[services.development]
run = "pnpm --filter @workspace/routeworks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/routeworks", "run", "build" ]
serve = "static"
publicDir = "artifacts/routeworks/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22784"
BASE_PATH = "/"
